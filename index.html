<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Dillu Captures | Visual Storyteller</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Merriweather:wght@700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #0f0f17;
      --glass: rgba(255, 255, 255, 0.18);
      --glass-hover: rgba(255, 255, 255, 0.28);
      --glass-border: rgba(255, 255, 255, 0.22);
      --text-primary: #f8f9fa;
      --text-secondary: #b8bcc5;
      --accent-gold: #f59e0b;
      --accent-silver: #e5e7eb;
      --shadow-light: 0 16px 48px rgba(0, 0, 0, 0.45);
      --shadow-heavy: 0 36px 88px rgba(0, 0, 0, 0.65);
      --border-radius: 40px;
      --card-radius: 36px;
      --folder-radius: 28px;
      --transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
    }

    * {
      scroll-behavior: smooth;
    }

    html, body {
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ULTRA CLEAN NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      padding: 1.5rem 0;
      backdrop-filter: blur(35px);
      background: rgba(15, 15, 23, 0.35);
      border-bottom: 1px solid var(--glass-border);
    }

    .navbar-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 2.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-silver));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 1rem 2rem;
      border-radius: 50px;
      backdrop-filter: blur(25px);
      border: 1px solid transparent;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .nav-link::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--glass-hover), transparent);
      transition: var(--transition);
    }

    .nav-link:hover::before {
      left: 100%;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--text-primary);
      background: var(--glass-hover);
      border-color: var(--glass-border);
      transform: translateY(-6px);
      box-shadow: var(--shadow-light);
    }

    /* MAIN CONTAINER */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ULTRA GLASSY SECTIONS */
    .glass-section {
      background: var(--glass);
      backdrop-filter: blur(45px);
      border: 1px solid var(--glass-border);
      border-radius: var(--border-radius);
      padding: 5rem 3.5rem;
      margin: 5rem 0;
      box-shadow: var(--shadow-light);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .glass-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
      opacity: 0;
      transition: var(--transition);
    }

    .glass-section:hover::before {
      opacity: 1;
    }

    .glass-section:hover {
      background: var(--glass-hover);
      transform: translateY(-20px) scale(1.025);
      box-shadow: var(--shadow-heavy);
    }

    /* HERO SECTION */
    .hero {
      margin-top: 9rem;
      padding: 12rem 4rem 9rem;
      background: var(--glass-hover);
      border-radius: 0 0 var(--card-radius) var(--card-radius);
      border-bottom: 2px solid var(--glass-border);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 80%, rgba(245, 158, 11, 0.15), transparent 50%);
      pointer-events: none;
    }

    .hero-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      padding: 1.25rem 2.25rem;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 3rem;
      animation: slideInLeft 1.2s ease-out;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
    }

    .hero-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(4.5rem, 10vw, 6.5rem);
      line-height: 1.1;
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-silver));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 2.5rem;
      filter: drop-shadow(0 12px 32px rgba(245, 158, 11, 0.45));
      animation: fadeInUp 1.4s ease-out;
    }

    .hero-subtitle {
      color: var(--text-secondary);
      font-size: 1.4rem;
      margin-bottom: 4rem;
      max-width: 32rem;
      animation: fadeInUp 1.6s ease-out;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1.75rem;
      margin-bottom: 4rem;
      animation: fadeInUp 1.8s ease-out;
    }

    .hero-meta-tag {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem 2.25rem;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      color: var(--text-secondary);
      font-size: 1rem;
      transition: var(--transition);
      backdrop-filter: blur(25px);
    }

    .hero-meta-tag:hover {
      background: var(--glass-hover);
      transform: translateY(-6px);
      box-shadow: var(--shadow-light);
    }

    .hero-meta-tag i {
      color: var(--accent-gold);
      font-size: 1.4rem;
    }

    .hero-buttons {
      display: flex;
      gap: 2.5rem;
      flex-wrap: wrap;
      animation: fadeInUp 2s ease-out;
    }

    /* SERVICE CARDS */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 2.5rem;
      margin-top: 4rem;
    }

    .service-card {
      text-align: center;
      padding: 3rem 2rem;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      transition: var(--transition);
      cursor: pointer;
      height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      backdrop-filter: blur(35px);
      position: relative;
      overflow: hidden;
    }

    .service-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
      opacity: 0;
      transition: var(--transition);
    }

    .service-card:hover::before {
      opacity: 1;
    }

    .service-card:hover {
      background: var(--glass-hover);
      transform: translateY(-24px) rotateX(12deg);
      box-shadow: var(--shadow-heavy);
    }

    .service-card i {
      font-size: 3rem;
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-silver));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: block;
      margin-bottom: 1.25rem;
    }

    /* FOLDER GALLERY SYSTEM */
    .folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 3rem;
      margin-top: 4rem;
    }

    .folder-card {
      position: relative;
      height: 360px;
      border-radius: var(--folder-radius);
      overflow: hidden;
      background: var(--glass);
      border: 2px solid var(--glass-border);
      transition: var(--transition);
      cursor: pointer;
      backdrop-filter: blur(35px);
    }

    .folder-card:hover {
      transform: translateY(-28px) scale(1.04);
      box-shadow: var(--shadow-heavy);
    }

    .folder-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition);
    }

    .folder-card:hover img {
      transform: scale(1.18);
      filter: brightness(1.3) contrast(1.18);
    }

    .folder-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.97));
      color: white;
      padding: 3rem 2.5rem 2.5rem;
      transform: translateY(2rem);
      transition: var(--transition);
    }

    .folder-card:hover .folder-overlay {
      transform: translateY(0);
    }

    .folder-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-silver));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .folder-subtitle {
      font-size: 1.05rem;
      opacity: 0.95;
    }

    /* BUTTONS */
    .btn {
      padding: 1.5rem 3.5rem;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 1.25rem;
      transition: var(--transition);
      border: none;
      cursor: pointer;
      font-family: inherit;
      backdrop-filter: blur(25px);
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-silver));
      color: #000;
      box-shadow: 0 20px 48px rgba(245, 158, 11, 0.45);
    }

    .btn-primary:hover {
      transform: translateY(-10px) scale(1.08);
      box-shadow: 0 36px 72px rgba(245, 158, 11, 0.65);
    }

    .btn-secondary {
      background: var(--glass);
      color: var(--text-primary);
      border: 2px solid var(--glass-border);
    }

    .btn-secondary:hover {
      background: var(--glass-hover);
      transform: translateY(-8px);
      box-shadow: var(--shadow-light);
    }

    /* HERO IMAGE */
    .hero-image {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 1;
      border-radius: 50%;
      overflow: hidden;
      border: 8px solid rgba(255, 255, 255, 0.3);
      box-shadow: 
        0 48px 96px rgba(0, 0, 0, 0.55),
        inset 0 0 0 8px rgba(255, 255, 255, 0.25);
      animation: float 10s ease-in-out infinite;
      transition: var(--transition);
    }

    .hero-image:hover {
      transform: scale(1.1) rotate(3deg);
      box-shadow: 
        0 72px 144px rgba(0, 0, 0, 0.75),
        inset 0 0 0 10px rgba(255, 255, 255, 0.3);
    }

    /* SECTION TITLES */
    .section-title {
      font-family: 'Merriweather', serif;
      font-size: clamp(3.5rem, 7vw, 4.5rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-silver));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 2rem;
      text-align: center;
      filter: drop-shadow(0 12px 32px rgba(245, 158, 11, 0.35));
    }

    .section-subtitle {
      color: var(--text-secondary);
      font-size: 1.45rem;
      text-align: center;
      max-width: 45rem;
      margin: 0 auto 5rem;
    }

    /* CONTACT GRID */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      margin-top: 4rem;
    }

    .stats-card, .process-panel {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      padding: 4.5rem;
      backdrop-filter: blur(45px);
      text-align: center;
    }

    .stats-number {
      font-size: 6rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-silver));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1.5rem;
    }

    .process-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    .process-item {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem;
      background: var(--glass);
      border-radius: 28px;
      transition: var(--transition);
    }

    .process-item:hover {
      transform: translateX(16px);
      background: var(--glass-hover);
    }

    .process-item i {
      background: linear-gradient(135deg, var(--accent-gold), var(--accent-silver));
      color: white;
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .hero-content,
      .about-grid,
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 4rem;
        text-align: center;
      }

      .hero-image {
        max-width: 380px;
        margin: 0 auto;
      }
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }

      .container {
        padding: 0 1.75rem;
      }

      .glass-section {
        padding: 3.5rem 2.5rem;
        margin: 3.5rem 0;
      }

      .services-grid {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 2rem;
      }

      .folder-grid {
        grid-template-columns: 1fr;
        gap: 2.5rem;
      }

      .contact-grid {
        grid-template-columns: 1fr;
        gap: 3.5rem;
      }
    }

    /* ANIMATIONS */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(6rem);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-6rem);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-2.5rem) rotate(4deg);
      }
    }

    .reveal {
      opacity: 0;
      transform: translateY(6rem);
      transition: all 1.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .reveal.active {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="#home" class="logo">Dillu Captures</a>
      <ul class="nav-links">
        <li><a href="#home" class="nav-link active">Home</a></li>
        <li><a href="#about" class="nav-link">About</a></li>
        <li><a href="#gallery" class="nav-link">Portfolio</a></li>
        <li><a href="#contact" class="nav-link">Contact</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <!-- HERO -->
    <section id="home" class="hero">
      <div class="hero-content">
        <div>
          <div class="hero-tag">
            <i class="fas fa-map-marker-alt"></i>
            Hyderabad Lifestyle Photographer
          </div>
          <h1 class="hero-title">Dillu Captures</h1>
          <p class="hero-subtitle">Bright, emotive, timeless frames that turn fleeting moments into family heirlooms.</p>
          <div class
