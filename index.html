<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Dillu Captures | Visual Storyteller</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Merriweather:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

<style>
*,*::before,*::after{box-sizing:border-box;scroll-behavior:smooth}

/* ================= GLASSY COLOR SYSTEM ================= */
:root{
--bg-main:#000;
--accent:#38bdf8;
--accent-soft:rgba(56,189,248,.18);
--accent-strong:#0ea5e9;
--text-main:#f9fafb;
--muted:#9ca3af;
--glass:rgba(15,23,42,.38);
--glass-strong:rgba(15,23,42,.6);
--border-glass:rgba(148,163,184,.45);
--shadow-soft:0 28px 80px rgba(0,0,0,.9);
--radius-lg:24px;
--transition-fast:.35s cubic-bezier(.19,1,.22,1);
--transition-slow:.8s cubic-bezier(.19,1,.22,1);
}

html,body{
margin:0;
padding:0;
height:100%;
font-family:'Montserrat',sans-serif;
color:var(--text-main);
background:#000;
overflow-x:hidden;
}

/* ================= BACKGROUND ================= */
body::before{
content:"";
position:fixed;
inset:-40%;
background:
radial-gradient(circle at 10% 0%,rgba(56,189,248,.25),transparent 55%),
radial-gradient(circle at 90% 100%,rgba(14,165,233,.25),transparent 55%);
filter:blur(110px);
opacity:.8;
z-index:-2;
animation:bgFloat 30s ease-in-out infinite alternate;
}
@keyframes bgFloat{to{transform:translate(-30px,30px) scale(1.04)}}

body::after{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top,rgba(15,23,42,.95),transparent 60%),
linear-gradient(135deg,rgba(15,23,42,.85),transparent 50%,#000);
opacity:.95;
z-index:-1;
}

/* ================= NAVBAR ================= */
.navbar{
position:fixed;
top:0;left:0;right:0;
padding:14px 24px;
z-index:1000;
display:flex;
justify-content:center;
}
.navbar-inner{
max-width:1200px;
width:100%;
padding:10px 18px;
border-radius:999px;
background:rgba(15,23,42,.6);
border:1px solid var(--border-glass);
backdrop-filter:blur(28px);
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:var(--shadow-soft);
}
.logo{
font-family:'Dancing Script',cursive;
font-size:1.6rem;
letter-spacing:.12em;
color:#f9fafb;
text-decoration:none;
}
.logo span{
background:linear-gradient(135deg,var(--accent),var(--accent-strong));
-webkit-background-clip:text;
color:transparent;
}

.nav-links{display:flex;gap:16px;position:relative}
.nav-link{
color:var(--muted);
text-decoration:none;
font-size:.85rem;
letter-spacing:.16em;
text-transform:uppercase;
display:flex;
align-items:center;
gap:6px;
}
.nav-link:hover,.nav-link.active{color:#f9fafb}
.nav-indicator{
position:absolute;
bottom:-4px;
height:2px;
background:linear-gradient(90deg,var(--accent),var(--accent-strong));
border-radius:999px;
transition:.4s;
}

/* ================= SECTIONS ================= */
main{max-width:1200px;margin:auto;padding:96px 16px 64px}
section{
margin:72px auto;
padding:48px 28px;
background:var(--glass);
border-radius:var(--radius-lg);
border:1px solid var(--border-glass);
backdrop-filter:blur(32px);
box-shadow:var(--shadow-soft);
transition:var(--transition-slow);
}
section:hover{
background:rgba(15,23,42,.45);
transform:translateY(-2px);
}

/* ================= HERO ================= */
#home{
display:grid;
grid-template-columns:1.3fr 1fr;
gap:32px;
align-items:center;
margin-top:96px;
}
.hero-pill{
display:inline-flex;
gap:8px;
padding:6px 14px;
border-radius:999px;
background:var(--accent-soft);
border:1px solid var(--accent);
font-size:.75rem;
letter-spacing:.18em;
text-transform:uppercase;
color:#e0f2fe;
}
#home h1{
font-family:'Dancing Script',cursive;
font-size:clamp(3rem,5vw,4.2rem);
letter-spacing:.08em;
}
#home h1 span{
background:linear-gradient(120deg,var(--accent),var(--accent-strong));
-webkit-background-clip:text;
color:transparent;
}
.hero-sub{color:var(--muted);max-width:520px}
.hero-meta span{
background:rgba(15,23,42,.55);
border:1px solid var(--border-glass);
border-radius:999px;
padding:6px 10px;
}
.hero-meta i{color:var(--accent)}

.cta-btn{
background:linear-gradient(135deg,var(--accent),var(--accent-strong));
color:#02131d;
padding:12px 26px;
border-radius:999px;
text-decoration:none;
font-weight:700;
letter-spacing:.16em;
}
.cta-secondary{
border:1px solid var(--border-glass);
border-radius:999px;
padding:10px 18px;
color:#e5e7eb;
text-decoration:none;
}

/* ================= HERO ORBIT ================= */
.hero-orbit{
.hero-orbit{
  width:min(360px,90vw);
  height:min(360px,90vw);
}
border-radius:50%;
border:1px solid var(--border-glass);
background:radial-gradient(circle at 20% 10%,rgba(56,189,248,.25),rgba(15,23,42,.95));
display:grid;
place-items:center;
box-shadow:var(--shadow-soft);
position:relative;
overflow:hidden;
}
.hero-orbit::before{
content:"";
position:absolute;
inset:-40%;
background:conic-gradient(from 180deg,rgba(56,189,248,.35),transparent);
animation:spin 40s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.hero-image-frame img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
  transform:scale(1.05);
}
.gallery-card:hover img{
  transform:scale(1.1);
}

/* ================= GALLERY ================= */
.gallery-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.05);
}
/* ================= CONTACT ================= */
.contact-buttons a.whatsapp{
background:#22d3ee;
border-color:#22d3ee;
color:#022c22;
}

/* ================= FOOTER ================= */
footer{text-align:center;font-size:.8rem;color:var(--muted);padding:20px}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
#home{grid-template-columns:1fr}
}
</style>
</head>

<body>

<nav class="navbar">
<div class="navbar-inner">
<a href="#home" class="logo"><span>Dillu</span> Captures</a>
</div>
</nav>

<main>

<section id="home">
<div>
<div class="hero-pill"><i class="fas fa-camera"></i> Hyderabad based photographer</div>
<h1><span>Dillu Captures</span></h1>
<p class="hero-sub">Bright, emotive, timeless frames — now with a clean glass aesthetic.</p>
</div>

<div class="hero-orbit">
<div class="hero-image-frame">
<img src="Images/IMG_1902.webp" alt="Hero image">
</div>
</div>
</section>

<!-- ================= GALLERY (UNCHANGED IMAGES) ================= -->
<section id="gallery">
<h2>Featured stories</h2>

<div class="gallery-grid">
<a class="gallery-card" href="Images/20240813114300_IMG_0855.webp" target="_blank">
<img src="Images/20240813114300_IMG_0855.webp">
</a>

<a class="gallery-card" href="Images/20240813112158_IMG_0822.webp" target="_blank">
<img src="Images/20240813112158_IMG_0822.webp">
</a>

<a class="gallery-card" href="Images/IMG_1902.webp" target="_blank">
<img src="Images/IMG_1902.webp">
</a>

<a class="gallery-card" href="Images/Haldi.webp" target="_blank">
<img src="Images/Haldi.webp">
</a>

<a class="gallery-card" href="Images/WhatsApp Image 2025-06-23 at 4.48.52 PM.webp" target="_blank">
<img src="Images/WhatsApp Image 2025-06-23 at 4.48.52 PM.webp">

<a class="gallery-card" href="Images/WhatsApp Image 2025-07-06 at 10.40.58 AM.webp" target="_blank">

</a>
</div>
</section>

</main>

<footer>© 2025 Dillu Captures. All rights reserved.</footer>

</body>
</html>
