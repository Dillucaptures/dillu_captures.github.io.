<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Dillu Captures | Visual Storyteller</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Merriweather:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      scroll-behavior: smooth;
    }
    :root {
      --bg-main: #000000;
      /* Glass tint accent - subtle icy blue glass */
      --accent: rgba(148, 163, 184, 0.6);
      --accent-soft: rgba(148, 163, 184, 0.15);
      --text-main: #f9fafb;
      --muted: #9ca3af;
      --glass: rgba(15, 23, 42, 0.36);
      --glass-strong: rgba(15, 23, 42, 0.55);
      --border-glass: rgba(148, 163, 184, 0.45);
      --shadow-soft: 0 24px 60px rgba(0, 0, 0, 0.8);
      --radius-lg: 24px;
      /* Smoother transitions */
      --transition-fast: 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --transition-slow: 1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      color: var(--text-main);
      background: #000000;
      overflow-x: hidden;
    }

    /* pure black with soft neutral glow */
    body::before {
      content: "";
      position: fixed;
      inset: -40%;
      background:
        radial-gradient(circle at 10% 0%, rgba(15, 23, 42, 0.6) 0, transparent 55%),
        radial-gradient(circle at 90% 100%, rgba(15, 23, 42, 0.7) 0, transparent 55%);
      filter: blur(95px);
      opacity: 0.8;
      z-index: -2;
      animation: bgFloat 35s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes bgFloat {
      0% { transform: translate3d(0,0,0) scale(1); }
      100% { transform: translate3d(-30px, 30px, 0) scale(1.04); }
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(15,23,42,0.9) 0, transparent 55%),
        linear-gradient(135deg, rgba(15,23,42,0.7), transparent 45%, transparent 70%, rgba(0,0,0,1));
      mix-blend-mode: normal;
      opacity: 0.92;
      z-index: -1;
      pointer-events: none;
    }

    main {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 96px 16px 64px;
    }

    section {
      position: relative;
      margin: 72px auto;
      padding: 48px 28px;
      background: var(--glass);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-glass);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      transform-origin: center;
      transition: all var(--transition-slow);
    }

    section::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 10% 0, rgba(255,255,255,0.14), transparent 55%),
        linear-gradient(135deg, rgba(255,255,255,0.06), transparent 45%);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-slow);
    }
    section:hover::before {
      opacity: 0.55;
    }
    section:hover {
      background: rgba(15,23,42,0.42);
      box-shadow: 0 28px 70px rgba(0,0,0,0.9);
      transform: translateY(-2px);
    }

    h1, h2 {
      font-family: 'Merriweather', serif;
      letter-spacing: 0.04em;
    }
    h2 {
      font-size: clamp(2rem, 2.6vw, 2.4rem);
      margin: 0 0 12px;
    }
    p {
      margin: 0;
      line-height: 1.6;
      color: var(--muted);
      font-size: 0.98rem;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 14px 24px;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .navbar-inner {
      width: 100%;
      max-width: 1200px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid var(--border-glass);
      background: rgba(15,23,42,0.55);
      backdrop-filter: blur(26px) saturate(185%);
      -webkit-backdrop-filter: blur(26px) saturate(185%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      box-shadow: 0 24px 65px rgba(0,0,0,0.85);
      transform: translateY(-40px);
      opacity: 0;
      pointer-events: auto;
      animation: navDrop 1.2s var(--transition-slow) 0.3s forwards;
    }
    @keyframes navDrop {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 1.6rem;
      color: #f9fafb;
      text-decoration: none;
      letter-spacing: 0.12em;
      white-space: nowrap;
      position: relative;
    }
    .logo span {
      /* Glass tint gradient */
      background: linear-gradient(135deg, rgba(148,163,184,0.8), rgba(99,102,241,0.6));
      -webkit-background-clip: text;
      color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 16px;
      align-items: center;
      position: relative;
    }

    .nav-link {
      position: relative;
      color: #9ca3af;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 6px 2px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all var(--transition-fast);
      opacity: 0.9;
    }
    .nav-link i {
      font-size: 0.9rem;
    }
    .nav-link:hover,
    .nav-link.active {
      color: #f9fafb;
      opacity: 1;
    }

    .nav-indicator {
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 56px;
      height: 2px;
      /* Glass tint gradient */
      background: linear-gradient(90deg, rgba(148,163,184,0.8), rgba(99,102,241,0.6));
      border-radius: 999px;
      transform-origin: left;
      transform: scaleX(0.3);
      transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* Hero */
    #home {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(0, 1fr);
      gap: 32px;
      align-items: center;
      margin-top: 96px;
      padding: 52px 40px;
    }
    .hero-copy {
      position: relative;
      z-index: 2;
    }

    .hero-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      /* Glass tint background */
      background: var(--accent-soft);
      border: 1px solid var(--accent);
      color: #e5e7eb;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 18px;
      transform: translateY(8px);
      opacity: 0;
      animation: fadeUp 1.2s var(--transition-slow) 0.4s forwards;
    }

    .hero-pill i {
      font-size: 0.9rem;
    }

    #home h1 {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(3rem, 5vw, 4.2rem);
      margin: 0 0 12px;
      letter-spacing: 0.08em;
      transform: translateY(20px);
      opacity: 0;
      animation: fadeUp 1.4s var(--transition-slow) 0.6s forwards;
    }
    #home h1 span {
      /* Glass tint gradient */
      background: linear-gradient(120deg, rgba(148,163,184,0.8), rgba(99,102,241,0.6));
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero-sub {
      margin-bottom: 26px;
      font-size: 1rem;
      color: var(--muted);
      max-width: 520px;
      transform: translateY(24px);
      opacity: 0;
      animation: fadeUp 1.4s var(--transition-slow) 0.8s forwards;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      margin-bottom: 26px;
      font-size: 0.85rem;
      color: var(--muted);
      transform: translateY(28px);
      opacity: 0;
      animation: fadeUp 1.4s var(--transition-slow) 1s forwards;
    }
    .hero-meta span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,0.48);
      border: 1px solid rgba(148,163,184,0.4);
      color: #e5e7eb;
      backdrop-filter: blur(20px);
    }
    .hero-meta i {
      /* Glass tint icons */
      color: var(--accent);
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      transform: translateY(32px);
      opacity: 0;
      animation: fadeUp 1.4s var(--transition-slow) 1.2s forwards;
    }

    .cta-btn {
      /* Glass tint gradient */
      background: linear-gradient(135deg, var(--accent), rgba(99,102,241,0.6));
      color: #ffffff;
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.9);
      transform-origin: center;
      transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .cta-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 26px 48px rgba(0,0,0,1);
      filter: brightness(1.05);
    }

    .cta-secondary {
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border: 1px solid var(--border-glass);
      text-decoration: none;
      color: #e5e7eb;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(15,23,42,0.7);
      backdrop-filter: blur(18px);
      transition: all var(--transition-fast);
    }
    .cta-secondary:hover {
      background: #f9fafb;
      color: #111827;
      border-color: #f9fafb;
      transform: translateY(-2px);
    }

    /* circular hero orbit + image */
    .hero-orbit {
      position: relative;
      width: min(360px, 90vw);
      height: min(360px, 90vw);
      margin: 0 auto;
      border-radius: 50%;
      border: 1px solid var(--border-glass);
      /* Glass tint background */
      background: radial-gradient(circle at 20% 10%, var(--accent-soft), rgba(15,23,42,0.96));
      overflow: hidden;
      display: grid;
      place-items: center;
      box-shadow: 0 26px 60px rgba(0,0,0,0.95);
      transform: translateY(16px) scale(0.98);
      opacity: 0;
      animation: orbitReveal 1.6s var(--transition-slow) 1.4s forwards ease-out;
      backdrop-filter: blur(28px) saturate(185%);
      -webkit-backdrop-filter: blur(28px) saturate(185%);
    }
    @keyframes orbitReveal {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .hero-orbit::before {
      content: "";
      position: absolute;
      inset: -40%;
      /* Glass tint conic gradient */
      background: conic-gradient(from 180deg, var(--accent-soft), transparent, var(--accent-soft), transparent);
      animation: spin 45s linear infinite;
      opacity: 0.7;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hero-image-frame {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: none;
      box-shadow: none;
      transform: translateZ(0);
    }

    .hero-image-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.05);
      transition: transform 10s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: block;
    }
    .hero-orbit:hover .hero-image-frame img {
      transform: scale(1.12);
    }

    .hero-tag-badge {
      position: absolute;
      inset: auto auto 18px 50%;
      transform: translateX(-50%);
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(15,23,42,0.92);
      border: 1px solid var(--border-glass);
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #e5e7eb;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(18px);
    }

    /* Reveal - Smoother */
    .reveal {
      opacity: 0;
      transform: translateY(32px) scale(0.99);
      transition: all var(--transition-slow);
      filter: blur(6px);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    /* About */
    #about {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 28px;
    }

    .about-text p {
      margin-top: 10px;
      max-width: 540px;
    }
    .about-list {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 14px;
      font-size: 0.85rem;
    }
    .about-item {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(15,23,42,0.55);
      border: 1px solid var(--border-glass);
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(20px);
      color: #e5e7eb;
      transition: all var(--transition-fast);
    }
    .about-item:hover {
      background: rgba(15,23,42,0.7);
      border-color: var(--accent);
    }
    .about-item i {
      /* Glass tint icons */
      color: var(--accent);
    }

    .about-card {
      border-radius: 20px;
      padding: 16px 14px;
      background: linear-gradient(145deg, rgba(24,24,27,0.98), rgba(55,65,81,0.92));
      border: 1px solid var(--border-glass);
      box-shadow: 0 24px 60px rgba(0,0,0,0.95);
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-start;
      justify-content: center;
      color: #f9fafb;
      position: relative;
      overflow: hidden;
      transition: all var(--transition-fast);
    }
    .about-card h3 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .about-card small {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.9;
    }
    .about-card span.big {
      /* Glass tint number */
      color: rgba(148,163,184,0.9);
    }
    .about-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(250,250,250,0.18), transparent 55%);
      mix-blend-mode: screen;
      opacity: 0;
      transition: opacity var(--transition-slow);
    }
    .about-card:hover::after {
      opacity: 1;
    }

    /* Gallery - ENHANCED WITH FOLDERS */
    #gallery {
      padding-top: 40px;
    }
    #gallery h2 {
      text-align: left;
    }
    #gallery > p {
      text-align: left;
      margin-bottom: 24px;
      max-width: 600px;
    }

    /* Gallery Folder Tabs */
    .gallery-tabs {
      display: flex;
      gap: 8px;
      margin: 32px 0 24px;
      padding: 12px 0;
      border-radius: 999px;
      background: rgba(15,23,42,0.6);
      border: 1px solid var(--border-glass);
      backdrop-filter: blur(26px);
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .gallery-tabs::-webkit-scrollbar {
      display: none;
    }
    .tab-btn {
      all: unset;
      padding: 10px 20px;
      border-radius: 999px;
      background: transparent;
      color: #9ca3af;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all var(--transition-fast);
      white-space: nowrap;
      border: 1px solid transparent;
    }
    .tab-btn i {
      font-size: 0.85rem;
    }
    .tab-btn:hover,
    .tab-btn.active {
      color: #f9fafb;
      /* Glass tint active state */
      background: var(--accent-soft);
      border-color: var(--accent);
      box-shadow: 0 8px 25px rgba(148,163,184,0.2);
    }

    .folders-grid {
      position: relative;
    }
    .folder {
      display: none;
    }
    .folder.active {
      display: block;
      animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .folder-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: rgba(15,23,42,0.7);
      border-radius: 16px;
      border: 1px solid var(--border-glass);
      backdrop-filter: blur(20px);
    }
    .folder-header h3 {
      margin: 0;
      font-size: 1.1rem;
      font-family: 'Merriweather', serif;
      color: #f9fafb;
    }
    .folder-count {
      font-size: 0.8rem;
      /* Glass tint count */
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 18px;
    }

    .gallery-card {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(15,23,42,0.5);
      border: 1px solid var(--border-glass);
      box-shadow: 0 22px 55px rgba(0,0,0,0.85);
      transform: translateY(10px) scale(0.98);
      transform-style: preserve-3d;
      transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      cursor: pointer;
      backdrop-filter: blur(26px) saturate(180%);
      -webkit-backdrop-filter: blur(26px) saturate(180%);
      text-decoration: none;
    }

    .gallery-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.05);
      transition: all 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: block;
    }

    .gallery-card::before {
      content: "";
      position: absolute;
      inset: -40%;
      /* Glass tint glow */
      background: radial-gradient(circle at top, var(--accent-soft), transparent 55%);
      opacity: 0;
      mix-blend-mode: soft-light;
      transition: opacity 0.8s ease-out;
    }

    .gallery-meta {
      position: absolute;
      inset: auto 12px 12px 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,0.8);
      border: 1px solid var(--border-glass);
      color: #f9fafb;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      justify-content: space-between;
      backdrop-filter: blur(18px);
    }

    .gallery-card:hover {
      transform: translateY(-8px) scale(1.02) rotate3d(1, 0.3, 0, -3deg);
      box-shadow: 0 28px 70px rgba(0,0,0,1);
      /* Glass tint border */
      border-color: var(--accent);
      background: rgba(15,23,42,0.6);
    }
    .gallery-card:hover img {
      transform: scale(1.16);
      filter: brightness(1.08) saturate(1.1);
    }
    .gallery-card:hover::before {
      opacity: 0.7;
    }

    /* Contact */
    #contact {
      text-align: left;
    }
    #contact p {
      margin-top: 8px;
      max-width: 520px;
    }

    .contact-main {
      margin-top: 24px;
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 24px;
      align-items: center;
    }

    .contact-details {
      font-size: 0.95rem;
      display: grid;
      gap: 10px;
    }
    .contact-details a {
      /* Glass tint links */
      color: rgba(148,163,184,0.9);
      text-decoration: none;
    }
    .contact-details span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #e5e7eb;
    }

    .contact-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }
    .contact-buttons a {
      flex: 1 1 150px;
      text-align: center;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border-glass);
      background: rgba(15,23,42,0.6);
      color: #e5e7eb;
      backdrop-filter: blur(20px);
      transition: all var(--transition-fast);
    }
    .contact-buttons a:hover {
      background: #f9fafb;
      color: #111827;
      border-color: #f9fafb;
      transform: translateY(-2px);
      box-shadow: 0 20px 45px rgba(0,0,0,0.95);
    }
    .contact-buttons a.whatsapp {
      background: rgba(34,197,94,0.96);
      border-color: #22c55e;
      color: #022c17;
    }
    .contact-buttons a.whatsapp:hover {
      filter: brightness(1.05);
    }

    .contact-panel {
      border-radius: 20px;
      padding: 18px 16px;
      background: var(--glass-strong);
      border: 1px solid var(--border-glass);
      box-shadow: 0 24px 60px rgba(0,0,0,0.9);
