<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Dillu Captures | Visual Storyteller</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Merriweather:wght@700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      scroll-behavior: smooth;
    }
    :root {
      --bg-main: #000000;
      --accent: #f8fafc;
      --accent-glow: #e2e8f0;
      --text-main: #f8fafc;
      --muted: #cbd5e1;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-strong: rgba(255, 255, 255, 0.12);
      --border-glass: rgba(255, 255, 255, 0.12);
      --shadow-soft: 0 25px 50px -12px rgba(0, 0, 0, 0.85);
      --shadow-glow: 0 0 0 1px rgba(255, 255, 255, 0.08);
      --radius-lg: 24px;
      --transition-fast: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      color: var(--text-main);
      background-color: #000;
      overflow-x: hidden;
      line-height: 1.6;
    }

    body {
      position: relative;
      min-height: 100vh;
      background-image:
        radial-gradient(circle at 20% 80%, rgba(0,0,0,0.8) 0, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(0,0,0,0.8) 0, transparent 50%),
        url("Images/bg-photo.webp");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(2px);
      z-index: -1;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 15% 15%, rgba(248, 250, 252, 0.06) 0, transparent 60%),
        radial-gradient(circle at 85% 85%, rgba(226, 232, 240, 0.04) 0, transparent 60%);
      filter: blur(60px);
      opacity: 0.8;
      mix-blend-mode: screen;
      z-index: -1;
      animation: glowFloat 20s ease-in-out infinite alternate;
    }
    @keyframes glowFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(15px, -15px) scale(1.02); }
    }

    main {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 100px 20px 80px;
    }

    section {
      position: relative;
      margin: 80px auto;
      padding: 56px 40px;
      background: var(--glass);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-glass);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      box-shadow: var(--shadow-soft), var(--shadow-glow);
      overflow: hidden;
      transition: all var(--transition-slow);
    }
    section::before {
      content: "";
      position: absolute;
      inset: 0;
      background: 
        linear-gradient(135deg, rgba(255,255,255,0.1), transparent 50%),
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.06), transparent 70%);
      opacity: 0;
      transition: opacity var(--transition-slow);
    }
    section:hover {
      background: rgba(255, 255, 255, 0.11);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-4px);
      box-shadow: 0 35px 70px -15px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.15);
    }
    section:hover::before {
      opacity: 1;
    }

    h1, h2 {
      font-family: 'Merriweather', serif;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0 0 16px;
    }
    h2 {
      font-size: clamp(1.8rem, 4vw, 2.3rem);
      color: var(--text-main);
    }
    p {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
      margin: 0 0 24px;
    }

    /* CLEAN NAVBAR */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 20px 24px;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .navbar-inner {
      width: 100%;
      max-width: 1200px;
      padding: 12px 24px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(40px) saturate(180%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-soft);
      transform: translateY(-50px);
      opacity: 0;
      pointer-events: auto;
      animation: navSlide 0.6s 0.2s forwards;
    }
    @keyframes navSlide {
      to { transform: translateY(0); opacity: 1; }
    }

    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-main);
      text-decoration: none;
      letter-spacing: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo span {
      background: linear-gradient(135deg, var(--accent-glow), var(--accent));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-size: 1.9rem;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      align-items: center;
    }

      color: var(--muted
