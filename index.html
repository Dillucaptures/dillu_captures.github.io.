<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Dillu Captures | Visual Storyteller</title>

  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      scroll-behavior: smooth;
    }
    :root {
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-strong: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.14);
      --glass-glow: rgba(255, 255, 255, 0.08);
      --text-primary: rgba(255, 255, 255, 0.95);
      --text-secondary: rgba(255, 255, 255, 0.7);
      --shadow-1: 0 8px 32px rgba(0, 0, 0, 0.35);
      --shadow-2: 0 2px 16px rgba(0, 0, 0, 0.25);
      --shadow-3: 0 20px 64px rgba(0, 0, 0, 0.45);
      --radius: 20px;
      --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: var(--text-primary);
      overflow-x: hidden;
      line-height: 1.5;
    }

    body {
      background-image: 
        linear-gradient(135deg, rgba(0,0,0,0.8) 0%, rgba(15,23,42,0.6) 50%, rgba(0,0,0,0.9) 100%),
        url("Images/bg-photo.webp");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: -1;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 120px 24px 80px;
    }

    section {
      margin: 100px 0;
      padding: 64px;
      background: var(--glass-bg);
      border-radius: var(--radius);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(60px) saturate(180%);
      -webkit-backdrop-filter: blur(60px) saturate(180%);
      box-shadow: var(--shadow-1), var(--shadow-2);
      position: relative;
      overflow: hidden;
    }

    section::before {
      content: "";
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse 50% 30% at 20% 20%, rgba(255,255,255,0.12), transparent 50%),
        linear-gradient(135deg, rgba(255,255,255,0.06), transparent 70%);
      opacity: 0;
      transition: opacity var(--transition);
    }

    section:hover::before {
      opacity: 1;
    }

    section:hover {
      background: var(--glass-strong);
      border-color: rgba(255,255,255,0.22);
      transform: translateY(-8px);
      box-shadow: var(--shadow-3), 0 0 0 1px rgba(255,255,255,0.12);
    }

    h1, h2, h3 {
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 24px;
      line-height: 1.2;
    }

    h1 { 
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-family: 'Dancing Script', cursive;
    }

    h2 { 
      font-size: clamp(2rem, 5vw, 3rem);
    }

    p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      font-weight: 400;
      max-width: 600px;
      margin-bottom: 32px;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 24px 32px;
      z-index: 1000;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
    }

    .navbar-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass-bg);
      border-radius: var(--radius);
      border: 1px solid var(--glass-border);
      padding: 16px 32px;
      box-shadow: var(--shadow-1);
    }

    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
    }

    .logo span {
      background: linear-gradient(135deg, #eab308, #f59e0b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 32px;
    }

    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 12px 20px;
      border-radius: 16px;
      transition: var(--transition);
      position: relative;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--text-primary);
      background: var(--glass-glow);
    }

    /* HERO */
    #home {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
      text-align: left;
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      backdrop-filter: blur(30px);
      margin-bottom: 32px;
    }

    .hero-tag i {
      color: #eab308;
      font-size: 1.1rem;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 48px 0;
    }

    .hero-meta span {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      color: var(--text-secondary);
      font-size: 0.95rem;
      backdrop-filter: blur(30px);
    }

    .hero-meta i {
      color: #eab308;
      font-size: 1.1rem;
      width: 20px;
    }

    .hero-actions {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, #eab308, #f59e0b);
      color: #000;
      font-weight: 600;
      padding: 20px 40px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow-2);
      transition: var(--transition);
    }

    .btn-primary:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-3);
    }

    .btn-secondary {
      padding: 18px 36px;
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 50px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--glass-bg);
      backdrop-filter: blur(30px);
      transition: var(--transition);
    }

    .btn-secondary:hover {
      background: var(--glass-strong);
      border-color: rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }

    .hero-image {
      position: relative;
      width: 100%;
      height: 420px;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(40px);
    }

    .hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s ease;
    }

    .hero-image:hover img {
      transform: scale(1.05);
    }

    .image-badge {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: rgba(0,0,0,0.8);
      border: 1px solid var(--glass-border);
      border-radius: 25px;
      color: var(--text-primary);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ABOUT */
    #about {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 64px;
      align-items: start;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 24px;
      margin-top: 48px;
    }

    .service-item {
      padding: 32px 24px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      text-align: center;
      backdrop-filter: blur(30px);
      transition: var(--transition);
      cursor: default;
    }

    .service-item:hover {
      background: var(--glass-strong);
      transform: translateY(-4px);
    }

    .service-icon {
      font-size: 2.5rem;
      color: #eab308;
      margin-bottom: 16px;
      display: block;
    }

    .stats-card {
      padding: 48px 32px;
      background: rgba(15,23,42,0.8);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      backdrop-filter: blur(40px);
      height: fit-content;
    }

    .stats-number {
      font-size: 4rem;
      font-weight: 700;
      color: #fde047;
      line-height: 1;
      margin-bottom: 8px;
    }

    .stats-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* GALLERY */
    #gallery {
      text-align: left;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
      margin-top: 64px;
    }

    .gallery-item {
      position: relative;
      aspect-ratio: 4/3;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(30px);
      box-shadow: var(--shadow-1);
      transition: var(--transition);
      cursor: pointer;
    }

    .gallery-item:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: var(--shadow-3);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.1);
    }

    .gallery-caption {
      position: absolute;
      bottom: 24px;
      left: 24px;
      right: 24px;
      padding: 20px;
      background: rgba(0,0,0,0.8);
      border-radius: 16px;
      color: var(--text-primary);
      font-size: 0.9rem;
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
    }

    /* CONTACT */
    #contact {
      text-align: left;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 80px;
      margin-top: 64px;
    }

    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      backdrop-filter: blur(30px);
      transition: var(--transition);
    }

    .contact-item:hover {
      background: var(--glass-strong);
    }

    .contact-icon {
      width: 48px;
      height: 48px;
      background: rgba(234, 179, 8, 0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #eab308;
    }

    .contact-buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 40px;
    }

    .contact-buttons .btn-primary,
    .contact-buttons .btn-secondary {
      width: 100%;
      justify-content: center;
    }

    .session-flow {
      background: var(--glass-strong);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 48px;
      backdrop-filter: blur(40px);
    }

    .session-flow h3 {
      font-size: 1.3rem;
      margin-bottom: 32px;
      color: var(--text-primary);
    }

    .session-flow ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .session-flow li {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      background: var(--glass-bg);
      border-radius: 16px;
      border: 1px solid var(--glass-border);
    }

    .session-flow i {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #eab308, #f59e0b);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 1rem;
      font-weight: 600;
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .contact-grid { grid-template-columns: 1fr; gap: 48px; }
      #about { grid-template-columns: 1fr; gap: 48px; }
    }

    @media (max-width: 768px) {
      main { padding: 100px 20px 60px; }
      section { padding: 48px 24px; margin: 60px 0; }
      .gallery-grid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; }
      #home { grid-template-columns: 1fr; text-align: center; gap: 64px; }
      .nav-links { display: none; }
      .navbar-inner { justify-content: center; }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
    }

    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="#home" class="logo"><span>Dillu</span> Captures</a>
      <div class="nav-links">
        <a href="#home" class="nav-link active">Home</a>
        <a href="#gallery" class="nav-link">Portfolio</a>
        <a href="#about" class="nav-link">About</a>
        <a href="#contact" class="nav-link">Contact</a>
      </div>
    </div>
